# Nginx server block for evaltools.u-next.com
# Dashboard: static files
# Tool frontends: EvalAI :3001, ComCoachAI :3002, ConvAI :3003
# Tool backends: ComCoachAI :8000, ConvAI :8003

server {
    listen 80;
    server_name evaltools.u-next.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name evaltools.u-next.com;

    ssl_certificate /etc/letsencrypt/live/evaltools.u-next.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evaltools.u-next.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/evaltools;
    index "Home page.html";

    location / {
        try_files $uri $uri/ =404;
    }

    location = /evalai {
        return 308 /evalai/;
    }

    # Streamlit reads Tools/EvalAI/.streamlit/config.toml and serves this prefix.
    location /evalai/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /evalai;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js is built with basePath "/comcoachai".
    location /comcoachai {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /comcoachai;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Public API prefix is removed before reaching the unchanged FastAPI routes.
    location /api/comcoachai/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /convai {
        return 308 /convai/;
    }

    # Vite is built with base "/convai/" and Wouter reads that same base.
    location /convai/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /convai;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Public API prefix is removed before reaching the unchanged FastAPI routes.
    location /api/convai/ {
        proxy_pass http://127.0.0.1:8003/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /convai;
    }

    client_max_body_size 50M;
}
